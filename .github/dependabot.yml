version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: tuesday
      time: "14:00"
      timezone: UTC
    groups:
      python-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: tuesday
      time: "14:00"
      timezone: UTC
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
